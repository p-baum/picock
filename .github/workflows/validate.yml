name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  skills:
    name: Distributed skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate distributed skills
        run: npm run validate:skills
